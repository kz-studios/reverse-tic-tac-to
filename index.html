<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Tic Tac To by KaiZen</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <main id="app-container">

        <section id="screen-title" class="screen active">
            <h1 class="game-title">Reverse Tic Tac To</h1>

            <section class="selection">
                <button id="btn-play">Play</button>
                <button id="btn-how-to-play">How To Play</button>
            </section>
            
        </section>

        <section id="screen-settings" class="screen hidden">
            </section>

        <section id="screen-gameplay" class="screen hidden">
            </section>

    </main>

    <dialog id="dialog-how-to-play" class="modal">
        <button id="btn-close-how-to-play" class="close-btn" aria-label="Close">×</button>
        
        <div class="slides-container">
            <div class="slide active">
                <img src="assets/images/placeholder1.png" alt="Rule 1">
                <p>The goal is the opposite of standard Tic Tac Toe. Force your opponent to get three in a row!</p>
            </div>
            <div class="slide hidden">
                <img src="assets/images/placeholder2.png" alt="Rule 2">
                <p>Players take turns placing their marks on the empty squares of the 3x3 grid.</p>
            </div>
            <div class="slide hidden">
                <img src="assets/images/placeholder3.png" alt="Rule 3">
                <p>If you complete a line of three horizontally, vertically, or diagonally, you lose.</p>
            </div>
        </div>

        <div class="slide-arrows">
            <button id="btn-prev-slide" class="arrow-btn" aria-label="Previous slide">&larr; Prev</button>
            <button id="btn-next-slide" class="arrow-btn" aria-label="Next slide">Next &rarr;</button>
        </div>

        <div class="dot-indicators">
            </div>
            
    </dialog>

    <dialog id="dialog-pause" class="modal">
        </dialog>

    <dialog id="dialog-game-over" class="modal">
        </dialog>

    <script type="module" src="js/app.js"></script>
</body>
</html>
